name: Package WordPress theme

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build theme zip
        id: build
        run: |
          base_version="$(awk -F': ' '/^Version:/{print $2; exit}' style.css)"
          build_version="${base_version}.${GITHUB_RUN_NUMBER}"
          theme_slug="besibau-theme"

          rm -rf build
          mkdir -p "build/${theme_slug}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='.DS_Store' \
            ./ "build/${theme_slug}/"

          sed -i -E "s/^Version:.*/Version: ${build_version}/" "build/${theme_slug}/style.css"

          cd build
          zip -r "${theme_slug}.zip" "${theme_slug}"

          echo "version=${build_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${build_version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.build.outputs.tag }}
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          notes="Automated WordPress theme package for commit ${GITHUB_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/besibau-theme.zip --clobber
            gh release edit "$TAG" \
              --title "BesiBau ${VERSION}" \
              --notes "$notes" \
              --latest
          else
            gh release create "$TAG" build/besibau-theme.zip \
              --target "$GITHUB_SHA" \
              --title "BesiBau ${VERSION}" \
              --notes "$notes" \
              --latest
          fi
